name: Activity Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          token_github: ${{ secrets.GH_TOKEN }}  # GraphQL token
          user: AlmazIsDev
          filename: assets/activity-graph.svg
          
          # Graph only
          base: ""
          
          # Habits chart
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_weekly: yes
          plugin_habits_from: 200
