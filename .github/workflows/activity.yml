name: Activity Graph (with private commits)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AlmazIsDev
          filename: assets/activity-graph.svg

          # Отключаем базовое содержимое, оставляем только плагин habits
          base: ""

          # Плагин habits (график активности)
          plugin_habits: yes
          plugin_habits_charts: yes              # включает график
          plugin_habits_facts: yes               # интересные факты
          plugin_habits_from: 200                # количество событий для анализа
          plugin_habits_days: 30                 # период (дней)

          # Опционально: часовой пояс для корректного отображения
          config_timezone: "Europe/Moscow"
