name: Activity Graph (with private commits)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          token_github: ${{ secrets.GH_TOKEN }} # Для GraphQL (рекомендуется)
          user: AlmazIsDev
          filename: assets/activity-graph.svg

          # Отключаем всё, оставляем только график активности
          base: ""
          
          # Плагин habits создаёт график активности
          plugin_habits: yes
          plugin_habits_charts: yes              # Показывать как график
          plugin_habits_weekly: yes              # Недельная разбивка
          plugin_habits_from: 200                # Количество точек
          plugin_habits_days: 30                 # За последние 30 дней
          plugin_habits_facts: yes               # Интересные факты
