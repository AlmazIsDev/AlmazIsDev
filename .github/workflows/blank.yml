name: Full Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          token_github: ${{ secrets.GH_TOKEN }} # For GraphQL (optional)
          user: AlmazIsDev
          filename: assets/pagespeed.svg

          # Base sections
          base: header, activity, community, repositories, metadata

          plugin_pagespeed: yes
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_url: https://mx-labs.net
