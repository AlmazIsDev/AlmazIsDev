name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AlmazIsDev
          filename: assets/github-stats.svg
          
          # Базовые секции
          base: header, activity, community, repositories, metadata
          
          # Топ языков
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Строки кода
          plugin_lines: yes
          
          # Достижения — ИСПРАВЛЕНО
          plugin_achievements: yes
          plugin_achievements_threshold: C  # Показывает даже маленькие достижения
          plugin_achievements_secrets: yes   # Учитывает приватные репо
          plugin_achievements_display: compact  # Компактный вид
          plugin_achievements_limit: 5       # Показывать топ-5
